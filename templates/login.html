<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام المصنع</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

    <div class="w-full max-w-md">
        
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800">تسجيل الدخول</h1>
                <p class="text-slate-500 mt-2">مرحباً بك مجدداً في نظام المصنع </p>
            </div>

            {% if error_message %}
        <div class="bg-red-100 border-l-4 border-red-500 text-red-800 p-4 mb-6 rounded-lg" role="alert">
            <p class="font-bold">حدث خطأ</p>
            <p class="text-sm">{{ error_message }}</p>
            
            {% if "التواصل" in error_message %}
                <hr class="my-2 border-red-300">
                <div class="text-sm space-y-1 mt-2">
                    <div class="flex items-center">
                        <p class="ml-2">&#128100;</p> <span>م/ محمد أبوالعلا</span>
                    </div>
                    <div class="flex items-center">
                        <p class="ml-2">&#128242;</p> <a href="https://wa.me/201023999283" target="_blank" class="text-blue-600 hover:underline">01023999283</a>
                    </div>
                </div>
            {% endif %}
        </div>
    {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">اسم المستخدم</label>
                        <input type="text" name="username" id="username" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">كلمة المرور</label>
                        <input type="password" name="password" id="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                </div>
                
                <div class="mt-8">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        دخـــول
                    </button>
                </div>
            </form>

        </div>
        <p class="text-center text-xs text-slate-500 mt-4">
            جميع الحقوق محفوظة &copy; {% now "Y" %}
        </p>
    </div>

</body>
</html>
