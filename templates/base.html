{% load account_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}لوحة التحكم{% endblock %} - برنامج MIA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }

        .sidebar-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background-color: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background-color: #a0aec0;
            border-radius: 10px;
        }

        .sidebar-link.active {
            background-color: #2563eb;
            color: white;
        }

        .action-card {
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e0;
        }

        .icon-wrapper-green {
            background-color: #f0fff4;
            color: #38a169;
        }

        .icon-wrapper-blue {
            background-color: #ebf8ff;
            color: #3182ce;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen overflow-hidden">

        <aside id="sidebar"
            class="flex flex-col bg-white text-slate-800 shadow-lg transition-all duration-300 ease-in-out w-64 flex-shrink-0">
            <div class="flex items-center justify-center p-4 border-b h-16">
                <img src="https://placehold.co/40x40/2563eb/FFFFFF?text=MIA" alt="Logo" class="rounded-full">
                <h1 id="sidebar-title" class="font-bold text-xl ml-3 mr-3 transition-opacity duration-300">برنامج MIA
                </h1>
            </div>

            <nav class="flex-1 overflow-y-auto sidebar-scroll p-2">
                <ul class="space-y-1">
                    {% for page in accessible_pages %}
                    <li>
                        <a href="{% url page.url_name %}"
                            class="sidebar-link flex items-center p-3 rounded-lg hover:bg-slate-200">
                            <i data-lucide="{{ page.icon_name }}" class="w-5 h-5"></i>
                            <span class="sidebar-text ml-4 mr-4">{{ page.name }}</span>
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>
            <div class="border-t p-2">
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit"
                        class="w-full text-right sidebar-link flex items-center p-3 rounded-lg text-red-500 hover:bg-red-100">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        <span class="sidebar-text ml-4 mr-4">تسجيل خروج</span>
                    </button>
                </form>
            </div>
        </aside>

        <div class="flex-1 relative">
            <main class="h-full overflow-y-auto p-6 lg:p-8">
                <button id="toggle-sidebar-btn"
                    class="absolute top-6 -right-3 z-10 bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center focus:outline-none hover:bg-blue-700">
                    <i id="toggle-icon" data-lucide="chevrons-right" class="w-4 h-4"></i>
                </button>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            lucide.createIcons();

            const toggleBtn = document.getElementById('toggle-sidebar-btn');
            const sidebar = document.getElementById('sidebar');
            const toggleIcon = document.getElementById('toggle-icon');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function () {
                    sidebar.classList.toggle('w-64');
                    sidebar.classList.toggle('w-20');

                    sidebarTexts.forEach(text => text.classList.toggle('hidden'));

                    if (sidebar.classList.contains('w-20')) {
                        toggleIcon.setAttribute('data-lucide', 'chevrons-left');
                    } else {
                        toggleIcon.setAttribute('data-lucide', 'chevrons-right');
                    }
                    lucide.createIcons();
                });
            }
        });
    </script>
</body>

</html>
