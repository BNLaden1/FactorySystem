<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - نظام المصنع</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen py-10">

    <div class="w-full max-w-lg">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800">إنشاء حساب جديد</h1>
                <p class="text-slate-500 mt-2">ابدأ رحلتك معنا في نظام المصنع</p>
            </div>

            {% if error_message %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-6 text-center" role="alert">
                    <span>{{ error_message }}</span>
                </div>
            {% endif %}
            {% if success_message %}
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg relative mb-6 text-center" role="alert">
                    <span>{{ success_message }}</span>
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="space-y-5">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">اسم المستخدم</label>
                        <input type="text" name="username" id="username" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                     <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">البريد الإلكتروني</label>
                        <input type="email" name="email" id="email" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">كلمة المرور</label>
                        <input type="password" name="password" id="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                     <div>
                        <label for="password2" class="block text-sm font-medium text-slate-700 mb-1">تأكيد كلمة المرور</label>
                        <input type="password" name="password2" id="password2" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition" required>
                    </div>
                </div>
                
                <div class="mt-8">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        إنشاء الحساب
                    </button>
                </div>
            </form>
            <p class="text-center text-sm text-slate-500 mt-6">
                لديك حساب بالفعل؟ <a href="{% url 'login' %}" class="font-semibold text-blue-600 hover:underline">سجل الدخول من هنا</a>
            </p>
        </div>
    </div>

</body>
</html>
